# ---------------------------------------------------------------------------
# admin.innosynch.com  ->  admin panel on 127.0.0.1:3000
# (Replace 3000 with the port your admin frontend actually listens on.)
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name admin.innosynch.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.innosynch.com;

    ssl_certificate     /etc/letsencrypt/live/admin.innosynch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.innosynch.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
