# ---------------------------------------------------------------------------
# api.innosynch.com  ->  Node backend on 127.0.0.1:5052
#
# IMPORTANT (CORS): do NOT add any `add_header Access-Control-*` directives,
# do NOT `proxy_hide_header Access-Control-Allow-Origin`, and do NOT short-
# circuit OPTIONS with `return 204` here. The Node app (cors: origin '*')
# sets all CORS headers itself. Adding them in nginx strips/overrides the
# app's headers and drops Access-Control-Allow-Origin, which is exactly what
# breaks /user/login, /user/google-login, etc. from dpp/admin.
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name api.innosynch.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.innosynch.com;

    ssl_certificate     /etc/letsencrypt/live/api.innosynch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.innosynch.com/privkey.pem;

    client_max_body_size 100M;   # backend accepts uploads up to 100mb

    location / {
        proxy_pass http://127.0.0.1:5052;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # socket.io / websocket upgrade (realtime notifications)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}
